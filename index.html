<!DOCTYPE html>
<html>
<head>
  <title>Pronosticuri Login</title>
</head>
<body>

<h2>Joc Pronosticuri - Login</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Parolă"><br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="resetPassword()">Am uitat parola</button>

<p id="msg"></p>

<script type="module">
import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

window.resetPassword = function () {
  let email = document.getElementById("email").value;

  sendPasswordResetEmail(auth, email)
    .then(() => {
      alert("📩 Email de resetare trimis!");
    })
    .catch((error) => {
      alert("Eroare: " + error.message);
    });
}
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  import {
    getFirestore,
    doc,
    setDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔴 PUI AICI firebaseConfig-ul tău din Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCu8iaqsajlMWQtViX8Ej0A2nto3nJh6zA",
  authDomain: "predictii-3654f.firebaseapp.com",
  projectId: "predictii-3654f",
  storageBucket: "predictii-3654f.firebasestorage.app",
  messagingSenderId: "815792500960",
  appId: "1:815792500960:web:5288066328f785ba1f2085"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 🟢 REGISTER
  window.register = async function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {
      const userCred = await createUserWithEmailAndPassword(auth, email, password);

      // salvăm user în Firestore
      await setDoc(doc(db, "users", userCred.user.uid), {
        email: email,
        points: 0,
		role: "user"
      });

      document.getElementById("msg").innerText = "Cont creat!";
    } catch (e) {
      document.getElementById("msg").innerText = e.message;
    }
  }

  // 🔵 LOGIN
  window.login = async function () {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      document.getElementById("msg").innerText = "Login reușit!";

      // aici intri în joc
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);

    } catch (e) {
      document.getElementById("msg").innerText = "Eroare login";
    }
  }

</script>

</body>
</html>
