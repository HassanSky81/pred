<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h1>Bine ai venit!</h1>

<p id="welcome"></p>

<script>
  let user = localStorage.getItem("user");

  if (!user) {
    window.location.href = "index.html";
  }

  document.getElementById("welcome").innerText =
    "Salut, " + user + "! Aici vor fi pronosticurile.";
</script>

</body>
</html>
