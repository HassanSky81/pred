<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Pronosticuri</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f4f4f9;
    }
    .container-cautare {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #ccc;
      background-color: #ffffff;
      border-radius: 8px;
      max-width: 400px;
    }
    input, button {
      padding: 8px;
      margin: 5px 0;
      font-size: 16px;
    }
    .meci-card {
      padding: 10px;
      margin-bottom: 8px;
      background: #eee;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      max-width: 300px;
    }
  </style>
</head>
<body>

  <h1>🏆 Bine ai venit la pronosticuri1!</h1>
  <p>Aici va fi jocul tău (meciuri + pronosticuri).</p>

  <div class="container-cautare">
    <h3>🔍 Caută meciurile dintr-o grupă</h3>
    <label for="groupInput">Introdu litera grupei (A-L):</label><br>
    <input type="text" id="groupInput" placeholder="Ex: A" maxlength="1" style="text-transform: uppercase; width: 60px; text-align: center;"><br>
    <button id="showMatchesBtn">Afișează meciuri</button>
    
    <div id="meciuriContainer" style="margin-top: 20px;"></div>
  </div>

  <button id="genBtn" style="display: none; margin-top: 20px; background-color: #4CAF50; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
    Generate All Matches
  </button>
  <button id="addNewField" style="display: none;"> AdaugaCampNou </button>

  <script type="module"> 
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCu8iaqsajlMWQtViX8Ej0A2nto3nJh6zA",
      authDomain: "predictii-3654f.firebaseapp.com",
      projectId: "predictii-3654f",
      storageBucket: "predictii-3654f.firebasestorage.app",
      messagingSenderId: "815792500960",
      appId: "1:815792500960:web:5288066328f785ba1f2085"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Funcția pentru afișare meciuri
    window.afiseazaMeciuriGrupa = async function(literaGrupei) {
      const container = document.getElementById("meciuriContainer");
      if (!container) return;
      
      container.innerHTML = "<p>Se încarcă meciurile...</p>";
      try {
        const matchesRef = collection(db, "wc2026", "config", "matches");
        const q = query(matchesRef, where("group", "==", literaGrupei));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          container.innerHTML = `<p style="color: red;">Nu s-au găsit meciuri generate pentru Grupa ${literaGrupei}.</p>`;
          return;
        }

        container.innerHTML = `<h4>Meciuri înregistrate în Grupa ${literaGrupei}:</h4>`;
        querySnapshot.forEach((docSnap) => {
          const meci = docSnap.data();
          container.innerHTML += `
            <div class="meci-card">
              <strong>${meci.home}</strong> 
              <span>vs</span> 
              <strong>${meci.away}</strong>
            </div>
          `;
        });
      } catch (error) {
        console.error("Eroare la preluarea meciurilor:", error);
        container.innerHTML = `<p style="color: red;">Eroare la descărcare: ${error.message}</p>`;
      }
    };
	
	//functia pentru adaugare un camp nou
	async function adaugaCampNou(){
	
		try {
		// 1. Obținem referința către subcolecția ta specifică
		const matchesCollectionRef = collection(db, "wc2026", "config", "matches");
		
		// 2. Citim toate documentele din această colecție
		const querySnapshot = await getDocs(matchesCollectionRef);
		
		if (querySnapshot.empty) {
		  console.log("Nu s-au găsit meciuri în această colecție.");
		  return;
		}

		console.log(`Am găsit ${querySnapshot.size} meciuri. Începe actualizarea...`);

		// 3. Parcurgem fiecare meci și îi adăugăm câmpul nou "Date"
		const promises = querySnapshot.docs.map((document) => {
		  const matchDocRef = doc(db, "wc2026", "config", "matches", document.id);
		  
		  // Aici poți pune o valoare text, timestamp sau un obiect cu data meciului
		  return updateDoc(matchDocRef, {
			Date: "2026-06-26" // Înlocuiește cu valoarea dorită pentru meci
		  });
		});

		// 4. Așteptăm ca toate documentele să fie actualizate în paralel
		await Promise.all(promises);
		
		console.log("✅ Toate meciurile au fost actualizate cu succes cu noul câmp 'Date'!");
	  } catch (error) {
		console.error("Eroare la actualizarea documentelor: ", error);
	  }
    
	};

    // Funcția ajutătoare pentru generarea unei grupe
    async function generateMatchesForGroup(groupLetter) {
      try {
        const groupSnap = await getDoc(doc(db, "wc2026", "config", "groups", groupLetter));
        if (!groupSnap.exists()) {
          console.log(`Grupa ${groupLetter} nu are configurare în Firestore.`);
          return;
        }
        
        const teams = groupSnap.data().teams;
        if (!teams || teams.length !== 4) {
          console.log(`Grupa ${groupLetter} nu are exact 4 echipe.`);
          return;
        }

        let matchCounter = 1;
        for (let i = 0; i < teams.length; i++) {
          for (let j = i + 1; j < teams.length; j++) {
            const matchId = `${groupLetter}_meci_${matchCounter}`;
            const matchData = {
              id: matchId,
              group: groupLetter,
              home: teams[i],
              away: teams[j],
              status: "scheduled",
              createdAt: new Date()
            };
            const matchDocRef = doc(db, "wc2026", "config", "matches", matchId);
            await setDoc(matchDocRef, matchData);
            matchCounter++;
          }
        }
      } catch (error) {
        console.error("Eroare la generare grupă:", error);
      }
    }

    // Funcția principală de generare toate cele 12 grupe
    window.generateAll12Groups = async function() {
      alert("Generarea tuturor celor 12 grupe a început!");
      const grupe = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
      for (const litera of grupe) {
        await generateMatchesForGroup(litera);
      }
      alert("Toate meciurile au fost generate!");
    };

    // Ascultătorul de stare Auth
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        console.log("Utilizator logat cu succes:", user.uid);

        // Activăm butonul de căutare
        const showMatchesBtn = document.getElementById("showMatchesBtn");
        if (showMatchesBtn) {
          showMatchesBtn.onclick = () => {
            const literaGrupei = document.getElementById("groupInput").value.trim().toUpperCase();
            if (!literaGrupei) {
              alert("Te rog să introduci o lită (A-L)!");
              return;
            }
            window.afiseazaMeciuriGrupa(literaGrupei);
          };
        }

        // Verificăm dacă este admin pentru butonul de generare
        try {
          const snap = await getDoc(doc(db, "users", user.uid));
          if (snap.exists() && snap.data().role === "admin") {
            const genBtn = document.getElementById("genBtn");
			const addNewField = document.getElementById("addNewField");			
            if (genBtn) {
              genBtn.style.display = "block";
              genBtn.onclick = () => { window.generateAll12Groups(); };
            }
			if (addNewField) {
              addNewField.style.display = "block";
              addNewField.onclick = () => { adaugaCampNou(); };
            }
          }
        } catch (error) {
          console.error("Eroare la verificarea rolului:", error);
        }
      } else {
        console.log("Niciun utilizator logat.");
      }
    });
  </script>
</body>
</html>
